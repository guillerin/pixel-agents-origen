<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Town - Furniture Shop Kanban Board</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 8px;
            color: #58a6ff;
            font-size: 1.6em;
        }
        .subtitle {
            text-align: center;
            color: #8b949e;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px 18px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
        }
        .stat-label {
            font-size: 0.75em;
            color: #8b949e;
            margin-top: 2px;
        }
        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #388bfd26;
            border-color: #58a6ff;
            color: #58a6ff;
        }
        .board {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 20px;
            min-height: 60vh;
        }
        .column {
            min-width: 260px;
            max-width: 280px;
            flex: 1;
            background: #161b22;
            border-radius: 10px;
            border: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }
        .column-header {
            padding: 12px 14px;
            border-bottom: 1px solid #30363d;
            font-weight: 600;
            font-size: 0.85em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .column-header .count {
            background: #30363d;
            color: #8b949e;
            border-radius: 10px;
            padding: 1px 8px;
            font-size: 0.8em;
            font-weight: normal;
        }
        .column-cards {
            padding: 8px;
            flex: 1;
            overflow-y: auto;
        }
        .card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: default;
            transition: border-color 0.2s;
        }
        .card:hover {
            border-color: #58a6ff;
        }
        .card-id {
            font-size: 0.7em;
            color: #8b949e;
            margin-bottom: 4px;
        }
        .card-title {
            font-size: 0.85em;
            font-weight: 500;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        .card-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .badge {
            font-size: 0.65em;
            padding: 2px 7px;
            border-radius: 10px;
            font-weight: 500;
        }
        .priority-critical { background: #f8514926; color: #f85149; border: 1px solid #f8514940; }
        .priority-high { background: #d2992226; color: #d29922; border: 1px solid #d2992240; }
        .priority-medium { background: #388bfd26; color: #58a6ff; border: 1px solid #388bfd40; }
        .priority-low { background: #30363d; color: #8b949e; border: 1px solid #30363d; }
        .phase-badge { background: #23883326; color: #3fb950; border: 1px solid #23883340; }
        .assignee-badge { background: #8957e526; color: #bc8cff; border: 1px solid #8957e540; }
        .col-backlog .column-header { border-left: 3px solid #8b949e; }
        .col-todo .column-header { border-left: 3px solid #58a6ff; }
        .col-in-progress .column-header { border-left: 3px solid #d29922; }
        .col-review .column-header { border-left: 3px solid #bc8cff; }
        .col-done .column-header { border-left: 3px solid #3fb950; }
        .col-blocked .column-header { border-left: 3px solid #f85149; }

        .legend {
            margin-top: 20px;
            text-align: center;
            font-size: 0.75em;
            color: #8b949e;
        }
        .legend span { margin: 0 10px; }
    </style>
</head>
<body>
    <h1>Token Town - Furniture Shop</h1>
    <p class="subtitle">Kanban Board | Updated: 2026-03-20</p>

    <div class="stats-bar" id="statsBar"></div>
    <div class="filters" id="filters"></div>
    <div class="board" id="board"></div>
    <div class="legend">
        <span>Agents:</span>
        <span style="color:#bc8cff">db-dev</span>
        <span style="color:#bc8cff">shared-dev</span>
        <span style="color:#bc8cff">go-dev</span>
        <span style="color:#bc8cff">react-dev</span>
        <span style="color:#bc8cff">angular-dev</span>
    </div>

    <script>
        const tasks = [
            { id: "TT-001", title: "Create DB migration 003_furniture_shop.sql", status: "done", priority: "critical", phase: "fase-1", assignee: "db-dev", created: "2026-03-19" },
            { id: "TT-002", title: "Create seed data for furniture catalog", status: "done", priority: "high", phase: "fase-1", assignee: "db-dev", created: "2026-03-19" },
            { id: "TT-003", title: "Add shared TypeScript types for furniture shop", status: "done", priority: "critical", phase: "fase-1", assignee: "shared-dev", created: "2026-03-19" },
            { id: "TT-004", title: "Add Go event types and WebSocket handlers", status: "done", priority: "critical", phase: "fase-2", assignee: "go-dev", created: "2026-03-19" },
            { id: "TT-005", title: "Implement CatalogService (Go)", status: "done", priority: "high", phase: "fase-2", assignee: "go-dev", created: "2026-03-19" },
            { id: "TT-006", title: "Implement PurchaseService (Go)", status: "done", priority: "high", phase: "fase-2", assignee: "go-dev", created: "2026-03-19" },
            { id: "TT-007", title: "Implement InventoryService (Go)", status: "done", priority: "high", phase: "fase-2", assignee: "go-dev", created: "2026-03-19" },
            { id: "TT-008", title: "Implement PlacementService (Go)", status: "done", priority: "high", phase: "fase-2", assignee: "go-dev", created: "2026-03-19" },
            { id: "TT-009", title: "Implement Admin API endpoints (Go)", status: "done", priority: "medium", phase: "fase-2", assignee: "go-dev", created: "2026-03-19" },
            { id: "TT-010", title: "React Shop UI - Catalog and product browsing", status: "done", priority: "high", phase: "fase-3", assignee: "react-dev", created: "2026-03-19" },
            { id: "TT-011", title: "React Shop UI - Purchase flow", status: "done", priority: "high", phase: "fase-3", assignee: "react-dev", created: "2026-03-19" },
            { id: "TT-012", title: "React Shop UI - Inventory display", status: "done", priority: "medium", phase: "fase-3", assignee: "react-dev", created: "2026-03-19" },
            { id: "TT-013", title: "React Shop UI - WebSocket event integration", status: "done", priority: "high", phase: "fase-3", assignee: "react-dev", created: "2026-03-19" },
            { id: "TT-014", title: "Angular Admin - Category management", status: "done", priority: "medium", phase: "fase-4", assignee: "angular-dev", created: "2026-03-19" },
            { id: "TT-015", title: "Angular Admin - Product CRUD", status: "done", priority: "medium", phase: "fase-4", assignee: "angular-dev", created: "2026-03-19" },
            { id: "TT-016", title: "Angular Admin - Analytics dashboard", status: "done", priority: "medium", phase: "fase-4", assignee: "angular-dev", created: "2026-03-19" },
            { id: "TT-017", title: "VS Code Extension - Furniture placement editor", status: "backlog", priority: "low", phase: "fase-5", assignee: "react-dev", created: "2026-03-19" },
            { id: "TT-018", title: "Collision detection UI for furniture placement", status: "backlog", priority: "low", phase: "fase-5", assignee: "react-dev", created: "2026-03-19" },
            { id: "TT-019", title: "Load testing for concurrent purchases", status: "backlog", priority: "low", phase: "fase-5", assignee: "go-dev", created: "2026-03-19" },
            { id: "TT-020", title: "Angular Admin - Bulk import/export of products", status: "backlog", priority: "low", phase: "fase-5", assignee: "angular-dev", created: "2026-03-19" },
        ];

        const columns = [
            { key: "backlog", label: "Backlog", class: "col-backlog" },
            { key: "todo", label: "To Do", class: "col-todo" },
            { key: "in-progress", label: "In Progress", class: "col-in-progress" },
            { key: "review", label: "Review", class: "col-review" },
            { key: "done", label: "Done", class: "col-done" },
            { key: "blocked", label: "Blocked", class: "col-blocked" },
        ];

        let activeFilter = "all";

        function render() {
            // Stats
            const statsBar = document.getElementById("statsBar");
            const statusCounts = {};
            columns.forEach(c => statusCounts[c.key] = 0);
            tasks.forEach(t => { if (statusCounts[t.status] !== undefined) statusCounts[t.status]++; });
            statsBar.innerHTML = `
                <div class="stat"><div class="stat-value">${tasks.length}</div><div class="stat-label">Total Tasks</div></div>
                <div class="stat"><div class="stat-value" style="color:#d29922">${statusCounts["in-progress"]}</div><div class="stat-label">In Progress</div></div>
                <div class="stat"><div class="stat-value" style="color:#58a6ff">${statusCounts["todo"]}</div><div class="stat-label">To Do</div></div>
                <div class="stat"><div class="stat-value" style="color:#3fb950">${statusCounts["done"]}</div><div class="stat-label">Done</div></div>
                <div class="stat"><div class="stat-value" style="color:#f85149">${statusCounts["blocked"]}</div><div class="stat-label">Blocked</div></div>
            `;

            // Filters
            const assignees = [...new Set(tasks.map(t => t.assignee))];
            const phases = [...new Set(tasks.map(t => t.phase))];
            const filtersDiv = document.getElementById("filters");
            filtersDiv.innerHTML = `
                <button class="filter-btn ${activeFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</button>
                ${assignees.map(a => `<button class="filter-btn ${activeFilter === a ? 'active' : ''}" onclick="setFilter('${a}')">${a}</button>`).join("")}
                ${phases.map(p => `<button class="filter-btn ${activeFilter === p ? 'active' : ''}" onclick="setFilter('${p}')">${p}</button>`).join("")}
            `;

            // Board
            const filtered = activeFilter === "all" ? tasks : tasks.filter(t => t.assignee === activeFilter || t.phase === activeFilter);
            const board = document.getElementById("board");
            board.innerHTML = columns.map(col => {
                const colTasks = filtered.filter(t => t.status === col.key);
                return `
                    <div class="column ${col.class}">
                        <div class="column-header">${col.label} <span class="count">${colTasks.length}</span></div>
                        <div class="column-cards">
                            ${colTasks.map(t => `
                                <div class="card">
                                    <div class="card-id">${t.id}</div>
                                    <div class="card-title">${t.title}</div>
                                    <div class="card-meta">
                                        <span class="badge priority-${t.priority}">${t.priority}</span>
                                        <span class="badge phase-badge">${t.phase}</span>
                                        <span class="badge assignee-badge">${t.assignee}</span>
                                    </div>
                                </div>
                            `).join("")}
                        </div>
                    </div>
                `;
            }).join("");
        }

        function setFilter(f) {
            activeFilter = f;
            render();
        }

        render();
    </script>
</body>
</html>
