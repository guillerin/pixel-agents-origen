version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tokentown-postgres
    restart: unless-stopped
    ports:
      - "30001:5432"
    environment:
      POSTGRES_DB: tokentown
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tokentown"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tokentown-redis
    restart: unless-stopped
    ports:
      - "30002:6379"
    volumes:
      - redis-data:/data
      - ./services/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
