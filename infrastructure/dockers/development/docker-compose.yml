version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tokentown-postgres
    restart: unless-stopped
    ports:
      - "30001:5432"
    environment:
      POSTGRES_DB: tokentown
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Enable query logging for development
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Initialize database with base schema
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      # Apply furniture shop migrations
      - ../../apps/servers/go-app/internal/db/migrations:/docker-entrypoint-initdb.d/02-migrations:ro
      # Seed data (applied after migrations)
      - ../../apps/servers/go-app/internal/db/seeds:/docker-entrypoint-initdb.d/03-seeds:ro
      # Backup directory
      - ./services/postgres/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tokentown"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tokentown-redis
    restart: unless-stopped
    ports:
      - "30002:6379"
    volumes:
      - redis-data:/data
      - ./services/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
